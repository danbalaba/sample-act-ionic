<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Calculator
    </ion-title>
    <ion-button 
      slot="end" 
      fill="clear" 
      size="small"
      (click)="clearHistory()"
      class="clear-history-btn"
    >
      <ion-icon name="trash-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="calculator-background">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Calculator</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="calculator-container">
    <div class="calculator-card">
      <!-- Display Screen -->
      <div class="display-container">
        <div class="display-expression">{{ expression }}</div>
        <div class="display-result">{{ currentValue || '0' }}</div>
        <div class="display-memory" *ngIf="memoryValue !== null">
          <ion-icon name="calculator-outline"></ion-icon> M: {{ memoryValue }}
        </div>
      </div>

      <!-- Calculator Buttons -->
      <div class="calculator-buttons">
        <!-- Row 1 - Memory and Function buttons -->
        <ion-button class="btn btn-memory" (click)="memoryClear()">MC</ion-button>
        <ion-button class="btn btn-memory" (click)="memoryRecall()">MR</ion-button>
        <ion-button class="btn btn-memory" (click)="memoryAdd()">M+</ion-button>
        <ion-button class="btn btn-memory" (click)="memorySubtract()">M-</ion-button>

        <!-- Row 2 - Function buttons -->
        <ion-button class="btn btn-function" (click)="clear()">AC</ion-button>
        <ion-button class="btn btn-function" (click)="clearEntry()">C</ion-button>
        <ion-button class="btn btn-function" (click)="toggleSign()">±</ion-button>
        <ion-button class="btn btn-operator" (click)="appendOperator('/')">÷</ion-button>

        <!-- Row 3 -->
        <ion-button class="btn btn-number" (click)="appendNumber('7')">7</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('8')">8</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('9')">9</ion-button>
        <ion-button class="btn btn-operator" (click)="appendOperator('*')">×</ion-button>

        <!-- Row 4 -->
        <ion-button class="btn btn-number" (click)="appendNumber('4')">4</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('5')">5</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('6')">6</ion-button>
        <ion-button class="btn btn-operator" (click)="appendOperator('-')">−</ion-button>

        <!-- Row 5 -->
        <ion-button class="btn btn-number" (click)="appendNumber('1')">1</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('2')">2</ion-button>
        <ion-button class="btn btn-number" (click)="appendNumber('3')">3</ion-button>
        <ion-button class="btn btn-operator" (click)="appendOperator('+')">+</ion-button>

        <!-- Row 6 -->
        <ion-button class="btn btn-number btn-zero" (click)="appendNumber('0')">0</ion-button>
        <ion-button class="btn btn-number" (click)="appendDecimal()">.</ion-button>
        <ion-button class="btn btn-number" (click)="percentage()">%</ion-button>
        <ion-button class="btn btn-equals" (click)="calculate()">=</ion-button>
      </div>
    </div>

    <!-- History Section -->
    <div class="history-container" *ngIf="history.length > 0">
      <h3 class="history-title">History</h3>
      <div class="history-list">
        <div class="history-item" *ngFor="let item of history">
          <div class="history-expression">{{ item.expression }}</div>
          <div class="history-result">{{ item.result }}</div>
        </div>
      </div>
    </div>

    <!-- No History message -->
    <div class="no-history" *ngIf="history.length === 0">
      <ion-icon name="book-outline"></ion-icon>
      <p>No calculation history</p>
    </div>
  </div>
</ion-content>
